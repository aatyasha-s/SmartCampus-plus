<!DOCTYPE html>
<html>
<head>
    <title>SmartCampus+ Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-left">
        <h1>SmartCampus+</h1>
        <p>Your all-in-one campus platform</p>
    </div>

    <div class="login-card">
        {% if error %}
        <div class="login-error" style="background: #3b82f6; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px;">{{error}}</div>
        {% endif %}

        <div id="signin-box">
            <h2>Sign In</h2>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p class="demo-text">New here? <a href="#" onclick="toggleForm()" style="color: #38bdf8;">Sign up as a Student</a></p>
        </div>

        <div id="signup-box" style="display: none;">
            <h2>Register Student</h2>
            <form action="/register" method="POST">
                <input type="text" name="new_username" placeholder="Choose Username" required>
                <input type="password" name="new_password" placeholder="Choose Password" required>
                <button type="submit" style="background: #10b981;">Create Account</button>
            </form>
            <p class="demo-text">Already have an account? <a href="#" onclick="toggleForm()" style="color: #38bdf8;">Sign In</a></p>
        </div>

    </div>
</div>

<script>
    function toggleForm() {
        const signin = document.getElementById('signin-box');
        const signup = document.getElementById('signup-box');
        if (signin.style.display === 'none') {
            signin.style.display = 'block';
            signup.style.display = 'none';
        } else {
            signin.style.display = 'none';
            signup.style.display = 'block';
        }
    }
</script>

</body>
</html>
